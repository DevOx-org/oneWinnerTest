# ── BattleXGround — Production NGINX Reverse Proxy ─────────────────────────
#
# Place this at: /etc/nginx/sites-available/battlexground
# Symlink:       ln -s /etc/nginx/sites-available/battlexground /etc/nginx/sites-enabled/
# Test:          sudo nginx -t
# Reload:        sudo systemctl reload nginx
#
# This config assumes:
#   - Node.js backend on port 5001 (single instance) or PM2 cluster
#   - SSL terminated by Cloudflare or a separate cert block (add your own)
# ────────────────────────────────────────────────────────────────────────────

# ── Connection limits (per IP) ───────────────────────────────────────────────
# Prevents a single IP from opening too many connections.
# 10m = ~160,000 unique IPs tracked.
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

# ── Request rate limits (per IP) ─────────────────────────────────────────────
# These are NGINX-level limits — a first line of defence before Express.
# 20 req/sec burst 40 for general traffic; 5 req/sec for auth.
limit_req_zone $binary_remote_addr zone=api_general:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/s;

# ── Upstream (Node.js backend) ───────────────────────────────────────────────
upstream battlexground_backend {
    # If running PM2 cluster with 4 workers on same host:
    server 127.0.0.1:5001;
    # server 127.0.0.1:5002;
    # server 127.0.0.1:5003;
    # server 127.0.0.1:5004;

    keepalive 64;  # persistent connections to backend
}

server {
    listen 80;
    server_name api.battlexground.com;  # Change to your domain

    # ── Global connection limit ──────────────────────────────────────────
    limit_conn conn_per_ip 50;

    # ── Timeouts ─────────────────────────────────────────────────────────
    proxy_connect_timeout 10s;
    proxy_read_timeout 30s;
    proxy_send_timeout 10s;

    # ── Gzip compression ────────────────────────────────────────────────
    gzip on;
    gzip_types application/json text/plain application/javascript;
    gzip_min_length 256;

    # ── Auth routes — strict rate limit ──────────────────────────────────
    location /api/auth {
        limit_req zone=api_auth burst=10 nodelay;

        proxy_pass http://battlexground_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Admin routes — no NGINX rate limit ───────────────────────────────
    location /api/admin {
        proxy_pass http://battlexground_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── All other API routes — general rate limit ────────────────────────
    location /api {
        limit_req zone=api_general burst=40 nodelay;

        proxy_pass http://battlexground_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Health check (bypass rate limits) ────────────────────────────────
    location = /api/health {
        proxy_pass http://battlexground_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── Default: return 404 for non-API paths ────────────────────────────
    location / {
        return 404 '{"success":false,"message":"Not Found"}';
        add_header Content-Type application/json;
    }
}
